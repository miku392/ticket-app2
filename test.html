<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>チケット管理</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #fff;
  }

  .screen {
    width: 100%;
    min-height: 100vh;
    padding: 20px 12px 40px;
    box-sizing: border-box;
    text-align: center;
  }

  h1 {
    font-size: 20px;
    margin-bottom: 20px;
  }

  #ticketList {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .ticket-row {
    display: grid;
    grid-template-columns: 56px 110px 50px 96px;
    gap: 6px;
    margin-bottom: 12px;
  }

  .cell,
  .btn {
    border: 1px solid #000;
    height: 44px;
    font-size: 15px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 8px rgba(0,0,0,0.25);
  }

  .btn:active:not(:disabled),
  .ok:active {
    transform: scale(0.90);
    background: #ddd;
  }

  .repurchase {
    font-size: 12px;
    color: #0070c0;
    font-weight: bold;
    background: #fff;
  }

  .repurchase:not(:disabled) {
    background: #fff6a5;
  }

  .use {
    color: #d60000;
    font-weight: bold;
    font-size: 20px;
    background: #fff6a5;
  }

  .repurchase:disabled,
  .use:disabled {
    background: #eee;
    color: #aaa;
    box-shadow: none;
  }

  .danger {
    color: #d60000;
    font-weight: bold;
  }

  .result-name {
    font-size: 34px;
    margin-top: 40px;
    margin-bottom: 20px;
  }

  .count {
    font-size: 22px;
    margin-bottom: 16px;
  }

  .red {
    color: #d60000;
    font-size: 36px;
    font-weight: bold;
  }

  .blue {
    color: #0070c0;
    font-size: 36px;
    font-weight: bold;
  }

  .date {
    font-size: 14px;
    margin-bottom: 10px;
  }

  .status {
    font-size: 30px;
    font-weight: bold;
    margin-bottom: 20px;
  }

  .price {
    color: #d60000;
    font-size: 26px;
    font-weight: bold;
  }

  .ok {
    width: 140px;
    height: 56px;
    border: 1px solid #000;
    font-size: 22px;
    border-radius: 10px;
    margin: 30px auto 0;
    display: block;
    background: #fff;
    box-shadow: 0 4px 8px rgba(0,0,0,0.25);
  }

  .hidden {
    display: none;
  }

  .extra-card{
    margin-top:16px;
    padding:10px;
    border:2px solid #ddd;
    border-radius:16px;
    background:#fafafa;
    text-align:center;
  }

  .extra-title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:18px;
  }

  #extraCount{
    font-size:28px;
    padding:10px 18px;
    border-radius:12px;
    font-weight:bold; 
  }

  .extra-buttons{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-bottom:18px;
  }

  .extra-receive{
    background:#fff6a5;
    color:#d60000;
    font-size: 20px;
    font-weight: bold;
    padding: 9px 9px;
    width: 90px;
  }

  .extra-clear{
    background:#999;
    color:white;
    font-size: 20px;
    font-weight: bold;
    padding: 9px 9px;
    width: 90px;
  }

  .extra-total{
    font-size:20px;
    font-weight:bold;
  }

  .extra-action-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;
    margin-bottom:12px;
  }

  .extra-select-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:0;
  }
</style>
</head>

<body>

<div id="listScreen" class="screen">
  <h1>チケット使用</h1>
  <div id="ticketList"></div>
  <div class="extra-card">
  <div class="extra-title">予定外人員</div>

  <div class="extra-action-row">
    <button class="btn extra-clear" onclick="clearExtra()">クリア</button>

    <div class="extra-select-row">
      <select id="extraCount">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>
      <span>人</span>
    </div>

    <button class="btn extra-receive" onclick="receiveExtra()">受領</button>
  </div>

  <div class="extra-total">
    総合計：<span id="extraTotal">0</span>人
  </div>
</div>
  <div id="loadingText" style="margin-top:16px;font-weight:bold;color:#d60000;"></div>
</div>

<div id="useResultScreen" class="screen hidden">
  <div class="result-name" id="useName"></div>
  <div class="count">
    残 <span id="useBefore"></span> → <span class="red">残 <span id="useAfter"></span></span>
  </div>
  <div class="date" id="useDate"></div>
  <div class="status">使用済</div>
  <button class="ok" onclick="back()">OK</button>
</div>

<div id="repurchaseScreen" class="screen hidden">
  <div class="result-name" id="repurchaseName"></div>
  <div class="count">
    残 <span id="repurchaseBefore"></span> → <span class="blue">残 <span id="repurchaseAfter"></span></span>
  </div>
  <div class="date" id="repurchaseDate"></div>
  <div class="price">6000円</div>
  <div class="status">受領済</div>
  <button class="ok" onclick="back()">OK</button>
</div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxCooIpU3fIUZLWAuOPM8Kt41w9NLdIGRHzP4H-ySHmECgrLnVeBjRMJZPzoP2YlxZy/exec";

let users = [];

let extraTotal = 0;

function jsonp(action, params, callback) {
  const callbackName = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
  window[callbackName] = function(data) {
    callback(data);
    delete window[callbackName];
    script.remove();
  };

  const query = new URLSearchParams({
    action: action,
    callback: callbackName,
    ...params
  });

  const script = document.createElement("script");
  script.src = GAS_URL + "?" + query.toString();
  document.body.appendChild(script);
}

function loadUsers() {
  jsonp("getUsers", {}, function(data) {
    if (!data.success) {
      alert("読み込みに失敗しました");
      return;
    }

    users = data.users;
    extraTotal = data.extraTotal || 0;
    document.getElementById("extraTotal").textContent = extraTotal;
    render();
  });
}

function render(){
  const list = document.getElementById("ticketList");
  list.innerHTML = "";

  users.forEach((u,i)=>{
    const row = document.createElement("div");
    row.className = "ticket-row";

    row.innerHTML = `
      <button class="btn repurchase"onclick="repurchase(${i}, this)">再購入</button>
      <div class="cell">${u.name}</div>
      <div class="cell ${u.tickets===1 ? "danger" : ""}">残 ${u.tickets}</div>
      <button class="btn use" ${u.tickets>0 ? "" : "disabled"} onclick="useTicket(${i})">使用</button>
    `;

    list.appendChild(row);
  });
}

function useTicket(i){
  if (isProcessing) return;

  const u = users[i];
  if (u.tickets <= 0) return;

  setProcessing(true);

  jsonp("useTicket", { name: u.name }, function(data) {
    setProcessing(false);

    if (!data.success) {
      alert(data.message);
      loadUsers();
      return;
    }

    u.tickets = data.after;

    document.getElementById("useName").textContent = data.name + "さん";
    document.getElementById("useBefore").textContent = data.before;
    document.getElementById("useAfter").textContent = data.after;
    document.getElementById("useDate").textContent = data.datetime + " に使用しました";

    show("useResultScreen");
  });
}

function repurchase(i,button){

  button.disabled = true;

  const u = users[i];

  setProcessing(true);

  jsonp("repurchase", { name: u.name }, function(data) {
    setProcessing(false);

    if (!data.success) {
      alert(data.message);
      return;
    }

    u.tickets = data.after;

    document.getElementById("repurchaseName").textContent = data.name + "さん";
    document.getElementById("repurchaseBefore").textContent = data.before;
    document.getElementById("repurchaseAfter").textContent = data.after;
    document.getElementById("repurchaseDate").textContent = data.datetime + " に再購入しました";

    show("repurchaseScreen");
  });
}

function receiveExtra() {
  const select = document.getElementById("extraCount");
  const count = Number(select.value);

  const ok = confirm(`${count}人受領しますか？`);
  if (!ok) return;

  setProcessing(true);

  jsonp("addExtraCount", { count: count }, function(data) {
    setProcessing(false);

    if (!data.success) {
      alert(data.message || "保存に失敗しました");
      return;
    }

    extraTotal = data.total;
    document.getElementById("extraTotal").textContent = extraTotal;

    select.value = "1";
  });
}

function clearExtra() {
  const ok = confirm("本当にクリアしますか？");
  if (!ok) return;

  setProcessing(true);

  jsonp("clearExtraCount", {}, function(data) {
    setProcessing(false);

    if (!data.success) {
      alert(data.message || "クリアに失敗しました");
      return;
    }

    extraTotal = data.total;

    document.getElementById("extraTotal").textContent = extraTotal;
  });
}

function show(id){
  document.getElementById("listScreen").classList.add("hidden");
  document.getElementById("useResultScreen").classList.add("hidden");
  document.getElementById("repurchaseScreen").classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
}

function back(){
  show("listScreen");
  loadUsers();
}

let isProcessing = false;

function setProcessing(on) {
  isProcessing = on;

  document.querySelectorAll("button").forEach(btn => {
    btn.disabled = on;
  });

  const loading = document.getElementById("loadingText");
  if (loading) {
    loading.textContent = on ? "処理中..." : "";
  }
}

loadUsers();
</script>

</body>
</html>
